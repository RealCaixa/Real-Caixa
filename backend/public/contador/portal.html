<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Portal do contador | Real Caixa</title>
    <link rel="stylesheet" href="/contador/portal.css">
</head>
<body>
    <div class="app-shell">
        <aside class="sidebar">
            <a class="brand" href="/contador/dashboard">
                <span class="brand-mark">RC</span>
                <span>
                    <strong>Real Caixa</strong>
                    <small>Contador</small>
                </span>
            </a>
            <nav>
                <a href="/contador/dashboard" data-route="dashboard">Dashboard</a>
                <a href="/contador/fechamentos" data-route="fechamentos">Fechamentos</a>
            </nav>
        </aside>

        <div class="workspace">
            <header class="topbar">
                <div>
                    <p class="eyebrow">Area exclusiva</p>
                    <h1 id="pageTitle">Portal do contador</h1>
                </div>
                <div class="user-box">
                    <span id="contadorName">Contador</span>
                    <button type="button" id="logoutButton">Sair</button>
                </div>
            </header>

            <main id="appContent" class="content">
                <section class="empty-state">Carregando...</section>
            </main>
        </div>
    </div>

    <script src="/contador/portal.js"></script>
</body>
</html>
