<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Real Caixa</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #0f766e 0%, #2563eb 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #1e293b;
        }
        .login-container {
            background: white;
            border-radius: 16px;
            padding: 36px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 45px rgba(15, 23, 42, 0.18);
        }
        .logo {
            text-align: center;
            font-size: 26px;
            font-weight: 800;
            color: #10b981;
            margin-bottom: 8px;
        }
        h1 {
            text-align: center;
            font-size: 24px;
            margin-bottom: 8px;
        }
        .subtitle {
            text-align: center;
            color: #64748b;
            font-size: 14px;
            margin-bottom: 28px;
        }
        .form-group { margin-bottom: 18px; }
        label {
            display: block;
            margin-bottom: 8px;
            color: #475569;
            font-weight: 700;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 16px;
        }
        input:focus {
            outline: none;
            border-color: #10b981;
        }
        .row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 6px 0 18px;
            color: #475569;
            font-size: 14px;
        }
        .row input { width: auto; }
        .btn-login {
            width: 100%;
            padding: 14px;
            background: #10b981;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
        }
        .btn-login:disabled {
            background: #94a3b8;
            cursor: not-allowed;
        }
        .links, .voltar {
            text-align: center;
            margin-top: 18px;
        }
        .links a, .voltar a {
            color: #0f766e;
            text-decoration: none;
            font-size: 14px;
            font-weight: 700;
        }
        .error-message {
            background: #fee2e2;
            color: #991b1b;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 18px;
            display: none;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <main class="login-container">
        <div class="logo">REAL CAIXA</div>
        <h1>Login do Cliente</h1>
        <p class="subtitle">Acesse o portal cloud da sua empresa.</p>

        <div class="error-message" id="errorMessage"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" autocomplete="email" required>
            </div>

            <div class="form-group">
                <label for="senha">Senha</label>
                <input type="password" id="senha" name="senha" autocomplete="current-password" required>
            </div>

            <label class="row">
                <input type="checkbox" id="lembrar">
                Manter sessao neste dispositivo
            </label>

            <button type="submit" class="btn-login" id="submitButton">Entrar</button>
        </form>

        <div class="links">
            <a href="/cadastro">Criar conta</a>
        </div>

        <div class="voltar">
            <a href="/">Voltar para pagina inicial</a>
        </div>
    </main>

    <script>
        const SESSION_KEY = 'realcaixa_cloud_session';

        function getStoredSession() {
            const raw = sessionStorage.getItem(SESSION_KEY) || localStorage.getItem(SESSION_KEY);
            return raw ? JSON.parse(raw) : null;
        }

        function saveSession(session, remember) {
            sessionStorage.setItem(SESSION_KEY, JSON.stringify(session));
            if (remember) {
                localStorage.setItem(SESSION_KEY, JSON.stringify(session));
            } else {
                localStorage.removeItem(SESSION_KEY);
            }
        }

        function showError(message) {
            const errorMessage = document.getElementById('errorMessage');
            errorMessage.textContent = message;
            errorMessage.style.display = 'block';
        }

        async function recoverSession() {
            const session = getStoredSession();
            if (!session?.token) return;

            const response = await fetch('/api/auth/me', {
                headers: { Authorization: `Bearer ${session.token}` }
            });

            if (response.ok) {
                window.location.href = '/dashboard';
            }
        }

        document.getElementById('loginForm').addEventListener('submit', async (event) => {
            event.preventDefault();

            const submitButton = document.getElementById('submitButton');
            submitButton.disabled = true;
            submitButton.textContent = 'Entrando...';

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: document.getElementById('email').value,
                        senha: document.getElementById('senha').value
                    })
                });
                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.erro || 'Nao foi possivel entrar.');
                }

                saveSession(data, document.getElementById('lembrar').checked);
                window.location.href = '/dashboard';
            } catch (error) {
                showError(error.message);
            } finally {
                submitButton.disabled = false;
                submitButton.textContent = 'Entrar';
            }
        });

        recoverSession().catch(() => {});
    </script>
</body>
</html>
