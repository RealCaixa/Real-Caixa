<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Real Caixa</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #10b981 0%, #0f766e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #1e293b;
        }
        .cadastro-container {
            background: white;
            border-radius: 16px;
            padding: 36px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 20px 45px rgba(15, 23, 42, 0.18);
        }
        .logo {
            text-align: center;
            font-size: 26px;
            font-weight: 800;
            color: #10b981;
            margin-bottom: 8px;
        }
        h1 {
            text-align: center;
            font-size: 24px;
            margin-bottom: 8px;
        }
        .subtitle {
            text-align: center;
            color: #64748b;
            font-size: 14px;
            margin-bottom: 28px;
        }
        .form-group { margin-bottom: 16px; }
        label {
            display: block;
            margin-bottom: 8px;
            color: #475569;
            font-weight: 700;
            font-size: 14px;
        }
        input, select {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 16px;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #10b981;
        }
        .plano-info {
            background: #f0fdf4;
            padding: 14px;
            border-radius: 10px;
            margin: 18px 0;
            border: 1px solid #bbf7d0;
            color: #166534;
            font-size: 14px;
            line-height: 1.5;
        }
        .btn-cadastrar {
            width: 100%;
            padding: 14px;
            background: #10b981;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
        }
        .btn-cadastrar:disabled {
            background: #94a3b8;
            cursor: not-allowed;
        }
        .feedback {
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 18px;
            display: none;
            font-size: 14px;
        }
        .feedback.error { background: #fee2e2; color: #991b1b; }
        .feedback.success { background: #dcfce7; color: #166534; }
        .links {
            text-align: center;
            margin-top: 18px;
        }
        .links a {
            color: #0f766e;
            text-decoration: none;
            font-size: 14px;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <main class="cadastro-container">
        <div class="logo">REAL CAIXA</div>
        <h1>Criar Conta</h1>
        <p class="subtitle">Cadastre sua empresa para usar o portal cloud.</p>

        <div class="feedback" id="feedback"></div>

        <form id="cadastroForm">
            <div class="form-group">
                <label for="nome">Nome completo</label>
                <input type="text" id="nome" name="nome" autocomplete="name" required>
            </div>

            <div class="form-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" autocomplete="email" required>
            </div>

            <div class="form-group">
                <label for="telefone">Telefone</label>
                <input type="tel" id="telefone" name="telefone" autocomplete="tel">
            </div>

            <div class="form-group">
                <label for="empresa">Nome da empresa</label>
                <input type="text" id="empresa" name="empresa" required>
            </div>

            <div class="form-group">
                <label for="cnpj">CNPJ</label>
                <input type="text" id="cnpj" name="cnpj" placeholder="Opcional">
            </div>

            <div class="form-group">
                <label for="senha">Senha</label>
                <input type="password" id="senha" name="senha" autocomplete="new-password" minlength="6" required>
            </div>

            <div class="form-group">
                <label for="plano">Plano</label>
                <select id="plano" name="plano" required>
                    <option value="basico">Basico - fundacao gratuita</option>
                    <option value="profissional">Profissional - preparado para operacao completa</option>
                </select>
            </div>

            <div class="plano-info" id="planoInfo">
                Basico: 1 usuario, ate 50 produtos e ate 100 vendas por mes.
            </div>

            <button type="submit" class="btn-cadastrar" id="submitButton">Criar conta</button>
        </form>

        <div class="links">
            <a href="/login">Ja tenho conta</a>
            <span> | </span>
            <a href="/">Voltar para pagina inicial</a>
        </div>
    </main>

    <script>
        const SESSION_KEY = 'realcaixa_cloud_session';
        const planInfo = {
            basico: 'Basico: 1 usuario, ate 50 produtos e ate 100 vendas por mes.',
            profissional: 'Profissional: ate 5 usuarios, produtos ampliados e vendas ampliadas.'
        };

        function saveSession(session) {
            sessionStorage.setItem(SESSION_KEY, JSON.stringify(session));
            localStorage.removeItem(SESSION_KEY);
        }

        function showFeedback(message, type) {
            const feedback = document.getElementById('feedback');
            feedback.textContent = message;
            feedback.className = `feedback ${type}`;
            feedback.style.display = 'block';
        }

        document.getElementById('plano').addEventListener('change', (event) => {
            document.getElementById('planoInfo').textContent = planInfo[event.target.value];
        });

        document.getElementById('cadastroForm').addEventListener('submit', async (event) => {
            event.preventDefault();

            const submitButton = document.getElementById('submitButton');
            submitButton.disabled = true;
            submitButton.textContent = 'Criando...';

            try {
                const response = await fetch('/api/auth/cadastro', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        nome: document.getElementById('nome').value,
                        email: document.getElementById('email').value,
                        telefone: document.getElementById('telefone').value,
                        empresa: document.getElementById('empresa').value,
                        cnpj: document.getElementById('cnpj').value,
                        senha: document.getElementById('senha').value,
                        plano: document.getElementById('plano').value
                    })
                });
                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.erro || 'Nao foi possivel criar a conta.');
                }

                saveSession(data);
                showFeedback('Conta criada com sucesso. Abrindo dashboard...', 'success');
                setTimeout(() => {
                    window.location.href = '/dashboard';
                }, 700);
            } catch (error) {
                showFeedback(error.message, 'error');
            } finally {
                submitButton.disabled = false;
                submitButton.textContent = 'Criar conta';
            }
        });
    </script>
</body>
</html>
