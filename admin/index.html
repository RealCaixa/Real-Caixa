<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Admin - Real Caixa</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #1e293b;
            color: #e2e8f0;
            min-height: 100vh;
        }
        .login-container {
            max-width: 400px;
            margin: 100px auto;
            background: #0f172a;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        .logo {
            text-align: center;
            font-size: 28px;
            font-weight: bold;
            color: #10b981;
            margin-bottom: 30px;
        }
        h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #f1f5f9;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #94a3b8;
            font-weight: 600;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #334155;
            border-radius: 10px;
            font-size: 16px;
            background: #1e293b;
            color: white;
        }
        input:focus {
            outline: none;
            border-color: #10b981;
        }
        .btn-login {
            width: 100%;
            padding: 14px;
            background: #10b981;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn-login:hover { background: #059669; }
        .error {
            background: #7f1d1d;
            color: #fca5a5;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            font-size: 14px;
        }
        .voltar {
            text-align: center;
            margin-top: 20px;
        }
        .voltar a {
            color: #94a3b8;
            text-decoration: none;
            font-size: 14px;
        }
        .voltar a:hover { color: #10b981; }
        
        /* Dashboard Admin */
        .dashboard {
            display: none;
            padding: 40px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .dashboard h1 { font-size: 32px; margin-bottom: 30px; }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .stat-card {
            background: #0f172a;
            padding: 25px;
            border-radius: 15px;
            border: 1px solid #334155;
        }
        .stat-card h3 { color: #94a3b8; font-size: 14px; margin-bottom: 10px; }
        .stat-card .valor { font-size: 28px; font-weight: bold; color: #10b981; }
    </style>
</head>
<body>
    <!-- Tela de Login Admin -->
    <div id="loginAdmin" class="login-container">
        <div class="logo">⚙️ ADMIN</div>
        <h2>Portal Administrativo</h2>
        
        <div class="error" id="errorMessage"></div>
        
        <form onsubmit="loginAdmin(event)">
            <div class="form-group">
                <label for="adminUser">Usuário</label>
                <input type="text" id="adminUser" placeholder="admin" required>
            </div>
            <div class="form-group">
                <label for="adminPass">Senha</label>
                <input type="password" id="adminPass" placeholder="••••••" required>
            </div>
            <button type="submit" class="btn-login">🔐 Acessar Painel</button>
        </form>
        
        <div class="voltar">
            <a href="/">← Voltar para página inicial</a>
        </div>
    </div>

    <!-- Dashboard Admin (oculto inicialmente) -->
    <div id="dashboardAdmin" class="dashboard">
        <h1>📊 Painel Administrativo</h1>
        
        <div class="stats">
            <div class="stat-card">
                <h3>Total de Clientes</h3>
                <div class="valor">247</div>
            </div>
            <div class="stat-card">
                <h3>Planos Ativos</h3>
                <div class="valor">189</div>
            </div>
            <div class="stat-card">
                <h3>Faturamento Mensal</h3>
                <div class="valor">R$ 9.431,10</div>
            </div>
            <div class="stat-card">
                <h3>Downloads App</h3>
                <div class="valor">1.247</div>
            </div>
        </div>
        
        <button onclick="sairAdmin()" style="background: #ef4444; color: white; padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold;">🚪 Sair do Admin</button>
    </div>

    <script>
        // Credenciais padrão (ALTERE EM PRODUÇÃO!)
        const ADMIN_CREDENTIALS = {
            user: 'admin',
            pass: 'realcaixa2026'
        };

        function loginAdmin(event) {
            event.preventDefault();
            
            const user = document.getElementById('adminUser').value;
            const pass = document.getElementById('adminPass').value;
            const errorMessage = document.getElementById('errorMessage');
            
            if (user === ADMIN_CREDENTIALS.user && pass === ADMIN_CREDENTIALS.pass) {
                // Login bem-sucedido
                localStorage.setItem('adminLogado', 'true');
                document.getElementById('loginAdmin').style.display = 'none';
                document.getElementById('dashboardAdmin').style.display = 'block';
            } else {
                errorMessage.style.display = 'block';
                errorMessage.textContent = '❌ Usuário ou senha inválidos!';
            }
        }

        function sairAdmin() {
            localStorage.removeItem('adminLogado');
            document.getElementById('loginAdmin').style.display = 'block';
            document.getElementById('dashboardAdmin').style.display = 'none';
        }

        // Verificar se já está logado
        if (localStorage.getItem('adminLogado') === 'true') {
            document.getElementById('loginAdmin').style.display = 'none';
            document.getElementById('dashboardAdmin').style.display = 'block';
        }
    </script>
</body>
</html>
